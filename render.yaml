version: "1"
services:
  - type: web
    name: orchid-bot
    runtime: python
    repo: https://github.com/lamsaorchid/orchid-instagram-bot
    plan: free
    envVars:
      - key: OPENAI_KEY
        sync: false
      - key: PAGE_ID
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeployTrigger: commit
    previews:
      generation: automatic
